apiVersion: v1
kind: Service
metadata:
  name: jobportal-frontend  # Give it a clear name
  labels:
    app: frontend
spec:
  type: ClusterIP          # Use ClusterIP for backend (private inside cluster)
  selector:
    app: frontend         # THIS MUST MATCH YOUR DEPLOYMENT LABEL
  ports:
  - protocol: TCP
    port: 80               # Port other pods use to talk to this service
    targetPort: 80         # The port your app is actually running on
